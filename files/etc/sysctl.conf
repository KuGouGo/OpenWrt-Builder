# ==========================================
# OpenWrt x86-64 (8GB 内存顶配) 专属性能优化
# ==========================================

# 1. 内存调度 (8G内存极度宽裕)
vm.swappiness = 1          # 内存管够，极度压缩物理内存进入SWAP的倾向
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
vm.overcommit_memory = 1
vm.min_free_kbytes = 262144  # 直接保留 256MB 作为内核紧急响应内存，无惧任何突发流量
vm.vfs_cache_pressure = 50

# 2. 核心网络队列 (并发能力拉满)
net.core.netdev_max_backlog = 65536  # 网卡设备吞吐队列上限翻倍
net.core.somaxconn = 32768           # 提升系统同时发起的TCP连接数
net.core.default_qdisc = fq_codel

# 3. TCP 缓冲区 (恢复到 VKVM 原版的 64MB 极限设置)
# 8GB 内存完全可以 hold 住 64MB 的缓冲，内网跑 2.5G/10G 也能轻松喂饱
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.ipv4.tcp_rmem = 4096 131070 67108864
net.ipv4.tcp_wmem = 4096 16384 67108864

# 4. 拥塞控制与 TCP 握手优化
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_max_syn_backlog = 16384
net.ipv4.tcp_tw_reuse = 1
net.ipv4.ip_local_port_range = 1024 65535
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_pacing_ca_ratio = 110

# 5. 成都联通 PPPoE 黑洞防御 (必备)
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_sack = 1

# 6. NAT 连接跟踪 (榨干 8G 内存的核心)
# 100万连接数大概只占用软路由 300MB 左右的内存，PT全速下载+数百个代理连接并发毫无压力
net.netfilter.nf_conntrack_max = 1048576
net.netfilter.nf_conntrack_tcp_timeout_established = 3600