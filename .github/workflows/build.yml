name: build

on:
  workflow_dispatch:

concurrency:
  group: openwrt-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tar zstd rsync gh

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          config_file="${GITHUB_WORKSPACE}/config/build.conf"
          [ -f "$config_file" ] || { echo "missing config/build.conf" >&2; exit 1; }

          set -a
          # shellcheck disable=SC1091
          . "$config_file"
          set +a

          : "${OPENWRT_TARGET:?missing OPENWRT_TARGET}"
          : "${OPENWRT_SUBTARGET:?missing OPENWRT_SUBTARGET}"
          : "${OPENWRT_PROFILE:?missing OPENWRT_PROFILE}"
          : "${OPENWRT_FS:?missing OPENWRT_FS}"
          : "${OPENWRT_IMAGES:?missing OPENWRT_IMAGES}"
          : "${ROOTFS_PARTSIZE:?missing ROOTFS_PARTSIZE}"
          : "${BUILD_BASE:?missing BUILD_BASE}"
          : "${PACKAGES_FILE:?missing PACKAGES_FILE}"

          if ! [[ "$ROOTFS_PARTSIZE" =~ ^[0-9]+$ ]]; then
            echo "ROOTFS_PARTSIZE must be an integer: $ROOTFS_PARTSIZE" >&2
            exit 1
          fi

          package_file="${GITHUB_WORKSPACE}/${PACKAGES_FILE}"
          [ -f "$package_file" ] || { echo "package file not found: ${PACKAGES_FILE}" >&2; exit 1; }

          sing_box_enabled="false"
          if awk '
            {
              sub(/\r$/, "")
              sub(/[[:space:]]*#.*/, "")
              gsub(/^[[:space:]]+|[[:space:]]+$/, "")
            }
            $0 == "sing-box" { found=1 }
            END { exit found ? 0 : 1 }
          ' "$package_file"; then
            sing_box_enabled="true"
          fi

          json="$(curl --retry 3 --retry-all-errors --connect-timeout 15 --max-time 60 -fsSL https://api.github.com/repos/openwrt/openwrt/releases/latest)"
          tag="$(printf '%s' "$json" | jq -r '.tag_name')"
          ver="${tag#v}"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "failed to get latest official release" >&2
            exit 1
          fi

          sing_box_tag=""
          sing_box_asset_name=""
          sing_box_asset_url=""
          if [ "$sing_box_enabled" = "true" ]; then
            sing_box_json="$(curl --retry 3 --retry-all-errors --connect-timeout 15 --max-time 60 -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest)"
            sing_box_tag="$(printf '%s' "$sing_box_json" | jq -r '.tag_name')"
            sing_box_asset_name="$(printf '%s' "$sing_box_json" | jq -r '.assets[] | select(.name | test("^sing-box_.*_openwrt_x86_64\\.apk$")) | .name' | head -n 1)"
            sing_box_asset_url="$(printf '%s' "$sing_box_json" | jq -r '.assets[] | select(.name | test("^sing-box_.*_openwrt_x86_64\\.apk$")) | .browser_download_url' | head -n 1)"
            if [ -z "$sing_box_asset_name" ] || [ "$sing_box_asset_name" = "null" ] || [ -z "$sing_box_asset_url" ] || [ "$sing_box_asset_url" = "null" ]; then
              echo "failed to find latest stable sing-box openwrt_x86_64 apk asset" >&2
              exit 1
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "target=$OPENWRT_TARGET" >> "$GITHUB_OUTPUT"
          echo "subtarget=$OPENWRT_SUBTARGET" >> "$GITHUB_OUTPUT"
          echo "profile=$OPENWRT_PROFILE" >> "$GITHUB_OUTPUT"
          echo "fs=$OPENWRT_FS" >> "$GITHUB_OUTPUT"
          echo "images<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$OPENWRT_IMAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "build_base=$BUILD_BASE" >> "$GITHUB_OUTPUT"
          echo "rootfs_partsize=$ROOTFS_PARTSIZE" >> "$GITHUB_OUTPUT"
          echo "package_file=$PACKAGES_FILE" >> "$GITHUB_OUTPUT"
          echo "sing_box_enabled=$sing_box_enabled" >> "$GITHUB_OUTPUT"
          echo "sing_box_tag=$sing_box_tag" >> "$GITHUB_OUTPUT"
          echo "sing_box_asset_name=$sing_box_asset_name" >> "$GITHUB_OUTPUT"
          echo "sing_box_asset_url=$sing_box_asset_url" >> "$GITHUB_OUTPUT"
          echo "imagebuilder_file=openwrt-imagebuilder-${ver}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}.Linux-x86_64.tar.zst" >> "$GITHUB_OUTPUT"
          echo "target_dir=imagebuilder/bin/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}" >> "$GITHUB_OUTPUT"

      - name: Build summary
        shell: bash
        run: |
          set -euo pipefail
          sing_box_tag="${{ steps.meta.outputs.sing_box_tag }}"
          if [ -z "$sing_box_tag" ]; then
            sing_box_tag="disabled"
          fi

          pkg_count="$(awk '
            {
              sub(/\r$/, "")
              sub(/[[:space:]]*#.*/, "")
              gsub(/^[[:space:]]+|[[:space:]]+$/, "")
            }
            NF && !seen[$0]++ { count++ }
            END { print count + 0 }
          ' "${GITHUB_WORKSPACE}/${{ steps.meta.outputs.package_file }}")"

          echo "OpenWrt version        : ${{ steps.meta.outputs.ver }}"
          echo "Target                 : ${{ steps.meta.outputs.target }}/${{ steps.meta.outputs.subtarget }}"
          echo "Profile                : ${{ steps.meta.outputs.profile }}"
          echo "Images                 : ${{ steps.meta.outputs.fs }} ${{ steps.meta.outputs.images }}"
          echo "Rootfs size            : ${{ steps.meta.outputs.rootfs_partsize }} MB"
          echo "Latest sing-box        : $sing_box_tag"
          echo "Packages file          : ${{ steps.meta.outputs.package_file }}"
          echo "Unique package entries : $pkg_count"
          echo "Build source           : ${{ steps.meta.outputs.build_base }}"
          echo "Output dir             : out/"

      - name: Download imagebuilder
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.meta.outputs.build_base }}/releases/${{ steps.meta.outputs.ver }}/targets/${{ steps.meta.outputs.target }}/${{ steps.meta.outputs.subtarget }}/${{ steps.meta.outputs.imagebuilder_file }}"
          echo "Downloading imagebuilder: $url"
          curl --retry 3 --retry-all-errors --connect-timeout 20 --max-time 180 -fL "$url" -o ib.tar.zst
          tar --zstd -xf ib.tar.zst
          mv openwrt-imagebuilder-* imagebuilder

      - name: Prepare files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p imagebuilder/files imagebuilder/packages diagnostics
          if [ -d files ]; then
            rsync -a files/ imagebuilder/files/
          fi

      - name: Prepare local packages
        id: local-packages
        shell: bash
        run: |
          set -euo pipefail
          packages_dir="${GITHUB_WORKSPACE}/packages"
          mkdir -p "$packages_dir"

          if [ "${{ steps.meta.outputs.sing_box_enabled }}" = "true" ]; then
            rm -f "$packages_dir"/sing-box_*_openwrt_x86_64.apk "$packages_dir"/sing-box_*_openwrt_x86_64.ipk
            curl --retry 3 --retry-all-errors --connect-timeout 20 --max-time 300 -fL \
              "${{ steps.meta.outputs.sing_box_asset_url }}" \
              -o "$packages_dir/${{ steps.meta.outputs.sing_box_asset_name }}"
          fi

          find "$packages_dir" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -print0 | while IFS= read -r -d '' pkg; do
            cp -f "$pkg" "${GITHUB_WORKSPACE}/imagebuilder/packages/"
          done

          local_pkg_count="$(find "${GITHUB_WORKSPACE}/imagebuilder/packages" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) | wc -l | awk '{print $1}')"
          echo "count=${local_pkg_count}" >> "$GITHUB_OUTPUT"

          find "${GITHUB_WORKSPACE}/imagebuilder/packages" -maxdepth 1 -type f | sort > "${GITHUB_WORKSPACE}/diagnostics/local-packages.txt"
          if [ -n "${{ steps.meta.outputs.sing_box_asset_name }}" ] && [ -f "${GITHUB_WORKSPACE}/imagebuilder/packages/${{ steps.meta.outputs.sing_box_asset_name }}" ]; then
            sha256sum "${GITHUB_WORKSPACE}/imagebuilder/packages/${{ steps.meta.outputs.sing_box_asset_name }}" | tee "${GITHUB_WORKSPACE}/diagnostics/sing-box.sha256"
          fi

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          pkg_file="${GITHUB_WORKSPACE}/${{ steps.meta.outputs.package_file }}"
          resolved_pkg_file="${GITHUB_WORKSPACE}/diagnostics/packages.resolved.txt"
          : > "$resolved_pkg_file"

          mapfile -t pkg_array < <(awk '
            {
              sub(/\r$/, "")
              sub(/[[:space:]]*#.*/, "")
              gsub(/^[[:space:]]+|[[:space:]]+$/, "")
            }
            NF && !seen[$0]++ { print }
          ' "$pkg_file")

          pkgs=""
          if [ ${#pkg_array[@]} -gt 0 ]; then
            printf '%s\n' "${pkg_array[@]}" > "$resolved_pkg_file"
            pkgs="$(printf '%s\n' "${pkg_array[@]}" | paste -sd' ' -)"
          fi

          cd imagebuilder

          make_args=(
            image
            PROFILE="${{ steps.meta.outputs.profile }}"
            FILES="files"
            ROOTFS_PARTSIZE="${{ steps.meta.outputs.rootfs_partsize }}"
          )

          if [ "${{ steps.local-packages.outputs.count }}" != "0" ]; then
            make_args+=(ADD_LOCAL_KEY=1)
          fi

          if [ -n "$pkgs" ]; then
            make_args+=(PACKAGES="$pkgs")
          fi

          make -j"$(nproc)" "${make_args[@]}" 2>&1 | tee "${GITHUB_WORKSPACE}/diagnostics/build.log"

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics

          cat > diagnostics/build.txt <<EOF
          version=${{ steps.meta.outputs.ver }}
          tag=${{ steps.meta.outputs.tag }}
          target=${{ steps.meta.outputs.target }}/${{ steps.meta.outputs.subtarget }}
          profile=${{ steps.meta.outputs.profile }}
          images=${{ steps.meta.outputs.fs }} ${{ steps.meta.outputs.images }}
          rootfs_partsize=${{ steps.meta.outputs.rootfs_partsize }}
          package_file=${{ steps.meta.outputs.package_file }}
          sing_box_tag=${{ steps.meta.outputs.sing_box_tag }}
          sing_box_asset_name=${{ steps.meta.outputs.sing_box_asset_name }}
          sing_box_asset_url=${{ steps.meta.outputs.sing_box_asset_url }}
          build_base=${{ steps.meta.outputs.build_base }}
          EOF

          find imagebuilder/bin/targets -maxdepth 3 -type f | sort > diagnostics/tree.txt || true
          cp -f "${{ steps.meta.outputs.package_file }}" diagnostics/packages.list
          cp -f config/build.conf diagnostics/build.conf
          [ -f imagebuilder/repositories ] && cp -f imagebuilder/repositories diagnostics/
          find imagebuilder/packages -maxdepth 1 -type f | sort > diagnostics/local-packages.txt || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: diagnostics/
          if-no-files-found: warn

      - name: Pick images
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          dir="${{ steps.meta.outputs.target_dir }}"
          mkdir -p out
          found=0

          while IFS= read -r image_name; do
            [ -n "$image_name" ] || continue
            want="openwrt-${{ steps.meta.outputs.ver }}-${{ steps.meta.outputs.target }}-${{ steps.meta.outputs.subtarget }}-${{ steps.meta.outputs.profile }}-${{ steps.meta.outputs.fs }}-${image_name}"
            src="${dir}/${want}"

            if [ ! -f "$src" ]; then
              src="$(find "$dir" -maxdepth 1 -type f -name "*${{ steps.meta.outputs.profile }}*${{ steps.meta.outputs.fs }}*${image_name}" | sort | head -n 1)"
            fi

            if [ -z "$src" ] || [ ! -f "$src" ]; then
              echo "image not found: $image_name" >&2
              find imagebuilder/bin/targets -maxdepth 3 -type f | sort >&2 || true
              exit 1
            fi

            cp -f "$src" "out/$want"
            sha256sum "out/$want" > "out/$want.sha256"
            found=1
          done < <(printf '%s\n' "${{ steps.meta.outputs.images }}" | xargs -n1)

          if [ "$found" -ne 1 ]; then
            echo "no images were collected" >&2
            exit 1
          fi

          find out -maxdepth 1 -type f | sort > out/manifest.txt
          echo "dir=out" >> "$GITHUB_OUTPUT"

      - if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-images-${{ steps.meta.outputs.ver }}
          path: ${{ steps.pick.outputs.dir }}/
          if-no-files-found: error

      - name: Publish release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          ver="${{ steps.meta.outputs.ver }}"
          title="OpenWrt ${ver} 路 x86_64 Images"
          sing_box_tag="${{ steps.meta.outputs.sing_box_tag }}"
          if [ -z "$sing_box_tag" ]; then
            sing_box_tag="disabled"
          fi

          cat > release-notes.txt <<EOF
          Official OpenWrt ${ver} x86_64 image built with ImageBuilder.

          - Target: ${{ steps.meta.outputs.target }}/${{ steps.meta.outputs.subtarget }}
          - Profile: ${{ steps.meta.outputs.profile }}
          - Images: ${{ steps.meta.outputs.fs }} ${{ steps.meta.outputs.images }}
          - Rootfs size: ${{ steps.meta.outputs.rootfs_partsize }} MB
          - sing-box: ${sing_box_tag}
          - Package list: ${{ steps.meta.outputs.package_file }}
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" out/* --clobber
            gh release edit "$tag" --title "$title" --notes-file release-notes.txt
          else
            gh release create "$tag" out/* --title "$title" --notes-file release-notes.txt
          fi
